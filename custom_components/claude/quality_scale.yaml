rules:
  # Bronze
  action-setup:
    status: exempt
    comment: The integration registers no custom actions.
  appropriate-polling: done
  brands:
    status: exempt
    comment: Custom integration; not in the brands repository.
  common-modules: done
  config-flow: done
  config-flow-test-coverage: todo
  dependency-transparency:
    status: done
    comment: Single pinned requirement, claude-agent-sdk, published on PyPI; it bundles the open-source Claude Code CLI.
  docs-actions:
    status: exempt
    comment: The integration registers no custom actions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup:
    status: exempt
    comment: Entities do not subscribe to external events.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions: done
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: todo
  parallel-updates: done
  reauthentication-flow: done
  test-coverage: todo

  # Gold
  devices: done
  diagnostics: done
  discovery: done
  discovery-update-info: done
  docs-data-update: done
  docs-examples: todo
  docs-known-limitations: done
  docs-supported-devices:
    status: exempt
    comment: Service integration; no physical devices.
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices:
    status: exempt
    comment: Devices are created per subentry, not discovered.
  entity-category:
    status: exempt
    comment: Primary entities only.
  entity-device-class:
    status: exempt
    comment: Conversation and AI Task entities have no device class.
  entity-disabled-by-default:
    status: exempt
    comment: No noisy or diagnostic entities.
  entity-translations: done
  exception-translations: done
  icon-translations: done
  reconfiguration-flow: done
  repair-issues:
    status: exempt
    comment: No repairable issues currently surfaced.
  stale-devices:
    status: exempt
    comment: Devices are removed with their subentry.

  # Platinum
  async-dependency: done
  inject-websession: done
  strict-typing: todo
